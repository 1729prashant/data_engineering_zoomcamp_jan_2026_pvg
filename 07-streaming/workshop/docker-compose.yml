services:
  # Define the service named 'redpanda', using the official Redpanda Docker image with the specified version.
  redpanda:
    image: redpandadata/redpanda:v25.3.9

    # Command to run the Redpanda server with specific configuration options.
    command:
      # Start the Redpanda service.
      - redpanda
      - start

      # Allocate 1 CPU core for Redpanda (affinity for a single processor).
      - --smp
      - '1'

      # Reserve no memory for Redpanda, potentially allowing it to dynamically use memory.
      - --reserve-memory
      - 0M

      # Enable overprovisioning of resources, which can help with resource allocation in a containerized environment.
      - --overprovisioned

      # Assign a unique node ID of '1' for this Redpanda instance in the cluster.
      - --node-id
      - '1'

      # Define the Kafka listener addresses that clients can connect to, one for internal and one for external connections.
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092

      # Advertise the Kafka address for other nodes to connect to, using Redpanda's internal service name for container communication.
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092

      # Define the Pandaproxy listener addresses for REST API-based interactions.
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:28082,OUTSIDE://0.0.0.0:8082

      # Advertise the Pandaproxy address to clients or other services.
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:28082,OUTSIDE://localhost:8082

      # Define the RPC address for internal communication with the Redpanda node.
      - --rpc-addr
      - 0.0.0.0:33145

      # Advertise the RPC address to other services or nodes.
      - --advertise-rpc-addr
      - redpanda:33145

    # Define the ports to expose, mapping them between the container and the host machine.
    ports:
      # Expose the Pandaproxy API on port 8082 for external access.
      - 8082:8082
      
      # Expose the Kafka API on port 9092 for external access (default Kafka port).
      - 9092:9092

      # Expose the Pandaproxy API on port 28082 for external access (alternative Pandaproxy port).
      - 28082:28082

      # Expose the Kafka internal communication port on 29092 for inter-container access.
      - 29092:29092

  jobmanager:
    build:
      context: .
      dockerfile: ./Dockerfile.flink
    image: pyflink-workshop
    pull_policy: never
    expose:
      - "6123"
    ports:
      - "8081:8081"
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m

  taskmanager:
    image: pyflink-workshop
    pull_policy: never
    expose:
      - "6121"
      - "6122"
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
    depends_on:
      - jobmanager
    command: taskmanager --taskmanager.registration.timeout 5 min
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 3

  postgres:
    image: postgres:18
    restart: on-failure
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"